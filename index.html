<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Larson Family Finance</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌲</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <script>document.documentElement.dataset.theme = localStorage.getItem("pf-theme") || "evergreen";</script>
</head>
<body>

  <div id="signin-overlay">
    <div style="font-size:3rem">🌲</div>
    <h1>Larson Family Finance</h1>
    <p>Private — family only.</p>
    <div id="gsi-button"></div>
    <form id="pw-form" style="display:none;gap:8px">
      <input id="pw-input" type="password" placeholder="Family password" autocomplete="current-password">
      <button class="btn primary" type="submit">Enter</button>
    </form>
    <div id="signin-error"></div>
  </div>

  <div id="app">
    <aside class="sidebar">
      <div class="logo">🌲 Family Finance<small>Larson household</small></div>
      <nav id="nav"></nav>
      <div class="foot">
        <select id="theme-select" title="Theme" onchange="App.setTheme(this.value)">
          <option value="evergreen">Evergreen</option>
          <option value="ivory">Ink &amp; Ivory</option>
          <option value="navy">Navy Ledger</option>
          <option value="gallery">Gallery</option>
        </select>
        <div style="margin-top:8px"><span id="sync-badge" class="sync ok">● synced</span></div>
      </div>
    </aside>
    <main class="main"><div id="page"></div></main>
  </div>

  <script src="js/core.js"></script>
  <script src="js/importer.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
